name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install
        run: python -m pip install -e . pytest
      - name: Compile
        run: python -m compileall -q src tests scripts
      - name: No live order static scan
        run: python scripts/no_live_order_static_scan.py
      - name: Basic secret scan
        run: python scripts/basic_secret_scan.py
      - name: Import smoke
        run: python scripts/import_smoke.py
      - name: Tests
        run: pytest -q
